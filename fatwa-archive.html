<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ফতোয়া আর্কাইভ — মুফতি আব্দুল লতিফ শেখ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;500;600;700&family=Cinzel:wght@400;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root{--em:#0a4a3a;--em2:#0d5c49;--em3:#1a7a5e;--emp:#e8f5f0;--gd:#c9a227;--gdl:#e4b84a;--bg:#f7f3ec;--bgd:#ede8df;--wh:#fff;--td:#1a1a2e;--tm:#3d3d56;--tl:#6b7280;--rad:12px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Serif Bengali',serif;background:var(--bg);color:var(--td);}
.top-nav{background:var(--em);padding:0.75rem 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.2);}
.nav-inner{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.nav-brand{display:flex;align-items:center;gap:0.65rem;text-decoration:none;}
.nav-emblem{width:36px;height:36px;background:linear-gradient(135deg,var(--gd),var(--gdl));border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Amiri',serif;font-size:1.1rem;color:var(--em);font-weight:700;}
.nav-name{font-size:.8rem;font-weight:700;color:#fff;}
.nav-links{display:flex;gap:.25rem;flex-wrap:wrap;}
.nav-links a{color:rgba(255,255,255,.8);text-decoration:none;font-size:.78rem;padding:.35rem .65rem;border-radius:7px;transition:all .2s;}
.nav-links a:hover,.nav-links a.act{background:rgba(201,162,39,.15);color:var(--gdl);}
.page-hero{background:linear-gradient(135deg,var(--em),var(--em2));padding:2.5rem 0 1.75rem;position:relative;overflow:hidden;}
.page-hero::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23c9a227' stroke-width='0.4' stroke-opacity='0.12'%3E%3Cpolygon points='30,2 58,16 58,44 30,58 2,44 2,16'/%3E%3C/g%3E%3C/svg%3E");background-size:60px;}
.ph-label{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.2em;color:var(--gdl);text-transform:uppercase;display:block;margin-bottom:.5rem;}
.ph-title{font-size:clamp(1.4rem,4vw,2.1rem);font-weight:700;color:#fff;margin-bottom:.4rem;}
.ph-sub{font-size:.84rem;color:rgba(255,255,255,.7);}
.bc{background:var(--wh);padding:.5rem 0;border-bottom:1px solid var(--bgd);font-size:.74rem;}
.bc a{color:var(--em);text-decoration:none;}
.main-layout{display:grid;grid-template-columns:260px 1fr;gap:1.5rem;padding:1.75rem 0 3rem;}
.sb-box{background:var(--wh);border-radius:var(--rad);padding:1.1rem;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.05);margin-bottom:1rem;}
.sb-title{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gd);margin-bottom:.85rem;padding-bottom:.45rem;border-bottom:1px solid var(--bgd);}
.search-box{display:flex;align-items:center;gap:.4rem;background:var(--bg);border:1.5px solid var(--bgd);border-radius:9px;padding:.45rem .7rem;}
.search-box input{border:none;background:none;outline:none;font-size:.8rem;color:var(--td);width:100%;}
.search-box:focus-within{border-color:var(--gd);}
.cat-list{display:flex;flex-direction:column;gap:.28rem;}
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:.5rem .7rem;border-radius:8px;cursor:pointer;font-size:.8rem;color:var(--tm);border:1.5px solid transparent;background:none;width:100%;text-align:left;}
.cat-item:hover,.cat-item.act{background:var(--emp);border-color:rgba(10,74,58,.15);color:var(--em);font-weight:600;}
.cat-item .cn{display:flex;align-items:center;gap:.45rem;}
.cat-item .cc{background:var(--bgd);color:var(--tl);font-size:.62rem;padding:.08rem .45rem;border-radius:50px;}
.cat-item.act .cc{background:var(--em);color:var(--gdl);}
.recent-f{display:flex;flex-direction:column;gap:.55rem;}
.rf-item{display:flex;gap:.6rem;align-items:flex-start;cursor:pointer;padding:.35rem;border-radius:7px;background:none;border:none;width:100%;text-align:left;}
.rf-item:hover{background:var(--bg);}
.rf-dot{width:6px;height:6px;background:var(--gd);border-radius:50%;margin-top:.42rem;flex-shrink:0;}
.rf-q{font-size:.75rem;color:var(--tm);line-height:1.5;}
.filter-bar{background:var(--wh);border-radius:var(--rad);padding:1rem 1.1rem;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.05);margin-bottom:1.1rem;display:flex;align-items:center;gap:.65rem;flex-wrap:wrap;}
.filter-bar .main-search{display:flex;align-items:center;gap:.5rem;background:var(--bg);border:1.5px solid var(--bgd);border-radius:9px;padding:.5rem .9rem;flex:1;min-width:180px;}
.filter-bar .main-search input{border:none;background:none;outline:none;font-size:.82rem;color:var(--td);width:100%;}
.filter-bar .main-search:focus-within{border-color:var(--gd);}
.btn-search-go{background:linear-gradient(135deg,var(--em),var(--em2));color:var(--gdl);border:none;border-radius:9px;padding:.5rem 1rem;font-size:.8rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:.4rem;flex-shrink:0;}
.filter-bar select{border:1.5px solid var(--bgd);border-radius:9px;padding:.48rem .75rem;font-size:.78rem;color:var(--td);background:var(--bg);outline:none;cursor:pointer;}
.cat-header{background:linear-gradient(135deg,var(--em),var(--em2));border-radius:var(--rad);padding:1.1rem 1.3rem;margin-bottom:1.1rem;display:flex;align-items:center;gap:.9rem;}
.cat-header .icon{font-size:1.8rem;}
.cat-header h2{font-size:1.05rem;font-weight:700;color:#fff;margin-bottom:.1rem;}
.cat-header p{font-size:.76rem;color:rgba(255,255,255,.7);}
.fatwa-card{background:var(--wh);border-radius:var(--rad);padding:1.3rem;border-left:4px solid var(--gd);box-shadow:0 2px 12px rgba(0,0,0,.05);margin-bottom:.85rem;position:relative;}
.fatwa-card:hover{box-shadow:0 4px 24px rgba(201,162,39,.18);}
.fatwa-card .fc-num{position:absolute;top:.9rem;right:.9rem;font-family:'Cinzel',serif;font-size:.6rem;color:var(--tl);background:var(--bg);padding:.12rem .45rem;border-radius:50px;}
.fatwa-card .fc-cat{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gd);margin-bottom:.45rem;}
.fatwa-card .fc-q{font-size:.93rem;font-weight:600;color:var(--td);margin-bottom:.55rem;line-height:1.5;padding-right:2.7rem;cursor:pointer;}
.fatwa-card .fc-ans{font-size:.8rem;color:var(--tl);line-height:1.7;margin-bottom:.8rem;}
.fatwa-card .fc-foot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--bgd);padding-top:.65rem;font-size:.71rem;color:var(--tl);flex-wrap:wrap;gap:0.5rem;}
.fc-meta{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;}
.btn-detail{font-size:.78rem;color:var(--em);text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:.3rem;background:none;border:none;cursor:pointer;padding:0.3rem 0.7rem;background:var(--emp);border-radius:50px;}
.btn-detail:hover{background:var(--em);color:#fff;}
.detail-panel{display:none;background:var(--wh);border-radius:var(--rad);box-shadow:0 8px 40px rgba(0,0,0,.12);border:1px solid rgba(0,0,0,.06);overflow:hidden;margin-bottom:1.1rem;}
.detail-panel.show{display:block;animation:slideD .3s ease;}
@keyframes slideD{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:none;}}
.dp-header{background:linear-gradient(135deg,var(--em),var(--em2));padding:1.3rem;position:relative;}
.dp-close{position:absolute;top:.9rem;right:.9rem;background:rgba(255,255,255,.15);border:none;width:28px;height:28px;border-radius:7px;color:#fff;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;}
.dp-close:hover{background:rgba(255,255,255,.25);}
.dp-cat{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gdl);margin-bottom:.45rem;}
.dp-q{font-size:1rem;font-weight:700;color:#fff;line-height:1.5;padding-right:2.3rem;}
.dp-body{padding:1.3rem;}
.dp-section{margin-bottom:1.3rem;}
.dp-section:last-child{margin-bottom:0;}
.dp-section-title{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gd);margin-bottom:.6rem;padding-bottom:.35rem;border-bottom:1px solid var(--bgd);}
.dp-answer{font-size:.87rem;color:var(--tm);line-height:1.95;background:var(--bg);border-radius:9px;padding:1rem 1.15rem;border-left:3px solid var(--em);}
.dp-evidence{font-size:.82rem;color:var(--tm);line-height:1.8;background:#fdf6e3;border-radius:9px;padding:.9rem 1.15rem;border:1px solid rgba(201,162,39,.2);}
.dp-evidence .ev-item{display:flex;align-items:flex-start;gap:.45rem;margin-bottom:.35rem;}
.dp-evidence .ev-item:last-child{margin-bottom:0;}
.dp-evidence .ev-item i{color:var(--gd);font-size:.7rem;margin-top:.28rem;flex-shrink:0;}
.dp-actions{display:flex;gap:.55rem;flex-wrap:wrap;padding:0 1.3rem 1.3rem;}
.dp-btn{display:inline-flex;align-items:center;gap:.38rem;padding:.5rem 1.1rem;border-radius:50px;font-size:.78rem;font-weight:600;cursor:pointer;border:none;text-decoration:none;}
.dp-btn-p{background:linear-gradient(135deg,var(--em),var(--em2));color:var(--gdl);}
.dp-btn-o{background:none;border:1.5px solid var(--bgd);color:var(--tm);}
.dp-btn-o:hover{border-color:var(--em);color:var(--em);}
.no-result{text-align:center;padding:2.5rem 1rem;color:var(--tl);}
.no-result i{font-size:2.5rem;margin-bottom:.85rem;color:var(--bgd);}
.pagination-wrap{display:flex;align-items:center;justify-content:space-between;margin-top:1.1rem;flex-wrap:wrap;gap:.65rem;}
.pag-info{font-size:.76rem;color:var(--tl);}
.pag-btns{display:flex;gap:.28rem;}
.pag-btn{width:30px;height:30px;border:1.5px solid var(--bgd);background:none;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.76rem;color:var(--tm);cursor:pointer;}
.pag-btn.act{background:var(--em);border-color:var(--em);color:#fff;}
.sb-toggle{display:none;background:var(--em);color:var(--gdl);border:none;border-radius:9px;padding:.5rem .8rem;font-size:.8rem;cursor:pointer;margin-bottom:1rem;align-items:center;gap:.4rem;width:100%;justify-content:center;}
@media(max-width:900px){.main-layout{grid-template-columns:1fr;}.sidebar{order:2;}.content-area{order:1;}.sb-toggle{display:flex;}.sidebar-inner{display:none;}.sidebar-inner.open{display:block;}}
@media(max-width:576px){.filter-bar{flex-direction:column;align-items:stretch;}.filter-bar .main-search{min-width:unset;}.dp-actions{padding:0 1rem 1rem;}.dp-body{padding:1rem;}.dp-header{padding:1rem;}.dp-q{font-size:.92rem;}}
</style>
</head>

<nav class="top-nav"><div class="container"><div class="nav-inner">
  <a href="index.html" class="nav-brand"><div class="nav-emblem">م</div><span class="nav-name">মুফতি আব্দুল লতিফ শেখ</span></a>

</div></div></nav>

<div class="page-hero"><div class="container">
  <span class="ph-label">দারুল ইফতা</span>
  <h1 class="ph-title">ফতোয়া আর্কাইভ</h1>
  <p class="ph-sub">কুরআন ও সুন্নাহর আলোকে ইসলামি প্রশ্নের সমাধান</p>
</div></div>
<div class="bc"><div class="container"><a href="index.html">হোম</a> &rsaquo; <span id="bc-cat">ফতোয়া আর্কাইভ</span></div></div>

<div class="container">
 <div class="main-layout">
  <aside class="sidebar">
   <button class="sb-toggle" onclick="toggleSB()"><i class="fas fa-filter"></i> বিভাগ ও অনুসন্ধান</button>
   <div class="sidebar-inner" id="sb-inner">
    <div class="sb-box">
     <div class="sb-title"><i class="fas fa-search"></i> ফতোয়া অনুসন্ধান</div>
     <div class="search-box"><i class="fas fa-search" style="color:var(--tl);"></i><input type="text" id="sb-search" placeholder="প্রশ্ন টাইপ করুন..." oninput="doSearch(this.value)"></div>
    </div>
    <div class="sb-box">
     <div class="sb-title"><i class="fas fa-list"></i> বিভাগসমূহ</div>
     <div class="cat-list" id="cat-list"></div>
    </div>
    <div class="sb-box">
     <div class="sb-title"><i class="fas fa-clock"></i> সাম্প্রতিক ফতোয়া</div>
     <div class="recent-f" id="recent-list"></div>
    </div>
   </div>
  </aside>

  <main class="content-area">
   <div class="filter-bar">
    <div class="main-search"><i class="fas fa-search" style="color:var(--tl);"></i><input type="text" id="main-search" placeholder="ফতোয়া অনুসন্ধান করুন..." oninput="doSearch(this.value)"></div>
    <button class="btn-search-go" onclick="doSearch(document.getElementById('main-search').value)"><i class="fas fa-search"></i> খুঁজুন</button>
    <select id="sort-sel" onchange="renderFatwas()"><option value="new">সর্বশেষ</option><option value="popular">সর্বাধিক পঠিত</option><option value="az">বর্ণানুক্রম</option></select>
   </div>
   <div class="cat-header"><div class="icon" id="cat-icon">📚</div><div><h2 id="cat-title">সকল ফতোয়া</h2><p id="cat-desc">সকল বিভাগের প্রকাশিত ফতোয়াসমূহ</p></div></div>
   <div class="detail-panel" id="detail-panel"></div>
   <div id="fatwa-list"></div>
   <div class="pagination-wrap" id="pag-wrap"></div>
  </main>
 </div>
</div>

<script src="db.js"></script>
<script>
let db, allFatwas, filtered=[], currentCat='all', currentSearch='', currentPage=1, PER_PAGE=8;

function init(){
  db=SiteDB.get();
  allFatwas=db.fatwas;
  renderCats();
  renderRecent();
  const params=new URLSearchParams(location.search);
  if(params.get('cat')) currentCat=params.get('cat');
  if(params.get('q')){
    currentSearch=params.get('q').toLowerCase();
    document.getElementById('main-search').value=params.get('q');
    document.getElementById('sb-search').value=params.get('q');
  }
  renderCats();
  renderFatwas();
  if(params.get('id')){
    setTimeout(()=>openDetail(parseInt(params.get('id'))), 100);
  }
}

function renderCats(){
  const cats=db.categories||[];
  const counts={};
  allFatwas.filter(f=>f.status==='published').forEach(f=>{counts[f.category]=(counts[f.category]||0)+1;});
  const total=allFatwas.filter(f=>f.status==='published').length;
  let html=`<button class="cat-item${currentCat==='all'?' act':''}" onclick="filterCat('all')"><span class="cn">📚 সব বিভাগ</span><span class="cc">${total}</span></button>`;
  html+=cats.map(c=>`<button class="cat-item${currentCat===c.slug?' act':''}" onclick="filterCat('${c.slug}')"><span class="cn">${c.icon} ${c.name}</span><span class="cc">${counts[c.slug]||0}</span></button>`).join('');
  document.getElementById('cat-list').innerHTML=html;
}

function renderRecent(){
  const recent=allFatwas.filter(f=>f.status==='published').slice(-5).reverse();
  document.getElementById('recent-list').innerHTML=recent.map(f=>`<button class="rf-item" onclick="openDetail(${f.id})"><div class="rf-dot"></div><div class="rf-q">${f.question.substring(0,55)}${f.question.length>55?'...':''}</div></button>`).join('');
}

function filterCat(slug){
  currentCat=slug;currentPage=1;currentSearch='';
  document.getElementById('sb-search').value='';document.getElementById('main-search').value='';
  document.getElementById('detail-panel').classList.remove('show');
  renderCats();renderFatwas();
  const url=new URL(location.href);
  if(slug==='all') url.searchParams.delete('cat'); else url.searchParams.set('cat',slug);
  url.searchParams.delete('id');url.searchParams.delete('q');
  history.pushState({},'',url);
  window.scrollTo({top:0,behavior:'smooth'});
}

function doSearch(v){
  currentSearch=v.toLowerCase();currentPage=1;
  document.getElementById('sb-search').value=v;
  document.getElementById('main-search').value=v;
  renderFatwas();
}

function getFiltered(){
  let data=allFatwas.filter(f=>f.status==='published');
  if(currentCat!=='all') data=data.filter(f=>f.category===currentCat);
  if(currentSearch) data=data.filter(f=>(f.question+f.answer+f.category).toLowerCase().includes(currentSearch));
  const sort=document.getElementById('sort-sel')?.value;
  if(sort==='popular') data=[...data].sort((a,b)=>(b.views||0)-(a.views||0));
  else if(sort==='az') data=[...data].sort((a,b)=>a.question.localeCompare(b.question,'bn'));
  else data=[...data].reverse();
  return data;
}

function renderFatwas(){
  const data=getFiltered();filtered=data;
  const cats=db.categories||[];
  const catObj=cats.find(c=>c.slug===currentCat)||{icon:'📚',name:'সকল ফতোয়া',desc:'সকল বিভাগের প্রকাশিত ফতোয়াসমূহ'};
  document.getElementById('cat-icon').textContent=catObj.icon;
  document.getElementById('cat-title').textContent=currentSearch?`"${document.getElementById('main-search').value}" এর অনুসন্ধান ফলাফল`:catObj.name;
  document.getElementById('cat-desc').textContent=catObj.desc+` (${data.length}টি ফতোয়া)`;
  document.getElementById('bc-cat').textContent=currentCat!=='all'?catObj.name:'ফতোয়া আর্কাইভ';

  const total=data.length, pages=Math.ceil(total/PER_PAGE);
  if(currentPage>pages) currentPage=Math.max(1,pages);
  const start=(currentPage-1)*PER_PAGE;
  const pageData=data.slice(start,start+PER_PAGE);

  if(!pageData.length){
    document.getElementById('fatwa-list').innerHTML=`<div class="no-result"><i class="fas fa-search"></i><h4 style="font-size:.95rem;font-weight:600;color:var(--tm);margin-bottom:.5rem;">কোনো ফতোয়া পাওয়া যায়নি</h4><p style="font-size:.82rem;">অন্য শব্দ দিয়ে অনুসন্ধান করুন বা বিভাগ পরিবর্তন করুন</p></div>`;
    document.getElementById('pag-wrap').innerHTML='';
    return;
  }

  document.getElementById('fatwa-list').innerHTML=pageData.map(f=>`
    <div class="fatwa-card" id="fc-${f.id}">
      <span class="fc-num">#${f.id}</span>
      <div class="fc-cat"><i class="fas fa-tag"></i> ${f.category}</div>
      <div class="fc-q" onclick="openDetail(${f.id})"><i class="fas fa-question-circle" style="color:var(--gd);margin-right:.45rem;"></i>${f.question}</div>
      ${f.answer?`<div class="fc-ans">${f.answer.substring(0,140)}${f.answer.length>140?'...':''}</div>`:''}
      <div class="fc-foot">
        <div class="fc-meta"><span><i class="far fa-calendar" style="margin-right:.25rem;"></i>${f.date||''}</span><span><i class="fas fa-eye" style="margin-right:.25rem;"></i>${(f.views||0).toLocaleString('bn-BD')} ভিউ</span></div>
        <button class="btn-detail" onclick="openDetail(${f.id})"><i class="fas fa-eye"></i> বিস্তারিত দেখুন</button>
      </div>
    </div>`).join('');

  if(pages<=1){document.getElementById('pag-wrap').innerHTML='';return;}
  let pagHTML=`<div class="pag-info">${start+1}–${Math.min(start+PER_PAGE,total)} / মোট ${total}টি</div><div class="pag-btns">`;
  pagHTML+=`<button class="pag-btn" onclick="goPag(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for(let p=1;p<=pages;p++){
    if(p===1||p===pages||Math.abs(p-currentPage)<=1) pagHTML+=`<button class="pag-btn${p===currentPage?' act':''}" onclick="goPag(${p})">${p}</button>`;
    else if(Math.abs(p-currentPage)===2) pagHTML+=`<span style="color:var(--tl);padding:0 2px;">…</span>`;
  }
  pagHTML+=`<button class="pag-btn" onclick="goPag(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button></div>`;
  document.getElementById('pag-wrap').innerHTML=pagHTML;
}

function goPag(p){
  const pages=Math.ceil(filtered.length/PER_PAGE);
  if(p<1||p>pages)return;
  currentPage=p;renderFatwas();
  document.querySelector('.content-area').scrollIntoView({behavior:'smooth'});
}

/* CRITICAL FIX: this used to just show a toast notification. Now it renders the FULL fatwa content. */
function openDetail(id){
  const f=allFatwas.find(x=>x.id===id);
  if(!f){
    document.getElementById('detail-panel').innerHTML=`<div class="dp-body"><div class="no-result"><i class="fas fa-exclamation-triangle"></i><p>এই ফতোয়াটি পাওয়া যায়নি।</p></div></div>`;
    document.getElementById('detail-panel').classList.add('show');
    return;
  }
  SiteDB.incrementView('fatwas', id);
  db=SiteDB.get(); // refresh local view count
  const evList=f.evidence?f.evidence.split(',').map(e=>e.trim()).filter(Boolean):[];
  const dp=document.getElementById('detail-panel');
  dp.innerHTML=`
    <div class="dp-header">
      <button class="dp-close" onclick="closeDetail()"><i class="fas fa-times"></i></button>
      <div class="dp-cat"><i class="fas fa-tag"></i> ${f.category}</div>
      <div class="dp-q">${f.question}</div>
    </div>
    <div class="dp-body">
      <div class="dp-section">
        <div class="dp-section-title"><i class="fas fa-check-circle"></i> উত্তর (জওয়াব)</div>
        <div class="dp-answer">${f.answer || 'এই ফতোয়ার উত্তর শীঘ্রই যোগ করা হবে।'}</div>
      </div>
      ${evList.length?`<div class="dp-section">
        <div class="dp-section-title"><i class="fas fa-book-open"></i> দলিল ও রেফারেন্স</div>
        <div class="dp-evidence">${evList.map(e=>`<div class="ev-item"><i class="fas fa-chevron-right"></i>${e}</div>`).join('')}</div>
      </div>`:''}
      <div class="dp-section">
        <div style="display:flex;gap:1.2rem;font-size:.76rem;color:var(--tl);flex-wrap:wrap;">
          <span><i class="fas fa-tag" style="margin-right:.3rem;color:var(--gd);"></i>${f.category}</span>
          <span><i class="fas fa-calendar" style="margin-right:.3rem;color:var(--gd);"></i>${f.date||''}</span>
          <span><i class="fas fa-eye" style="margin-right:.3rem;color:var(--gd);"></i>${(f.views||0).toLocaleString('bn-BD')} ভিউ</span>
        </div>
      </div>
    </div>
    <div class="dp-actions">
      <button class="dp-btn dp-btn-o" onclick="window.print()"><i class="fas fa-print"></i> প্রিন্ট করুন</button>
      <button class="dp-btn dp-btn-o" onclick="shareF(${f.id})"><i class="fas fa-share-alt"></i> শেয়ার করুন</button>
      <a href="index.html#ask-fatwa" class="dp-btn dp-btn-p"><i class="fas fa-question-circle"></i> নতুন প্রশ্ন করুন</a>
    </div>`;
  dp.classList.add('show');
  dp.scrollIntoView({behavior:'smooth',block:'start'});
  const url=new URL(location.href); url.searchParams.set('id',id); history.replaceState({},'',url);
}
function closeDetail(){
  document.getElementById('detail-panel').classList.remove('show');
  const url=new URL(location.href); url.searchParams.delete('id'); history.replaceState({},'',url);
}
function shareF(id){
  const url=location.origin+location.pathname+'?id='+id;
  if(navigator.share){navigator.share({title:'ফতোয়া',url});}
  else{navigator.clipboard?.writeText(url);alert('লিংক কপি হয়েছে!');}
}
function toggleSB(){document.getElementById('sb-inner').classList.toggle('open');}

init();
</script>
</body>
</html>
